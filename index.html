<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sunny's Studio Clock In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div id="shade" class="shade"></div>

    <header class="topbar">
      <div>
        <h1>Sunny's Studio</h1>
        <p>用心工作・好好生活 <span>⌁ ❧</span></p>
      </div>
      <div class="status-pill"><i></i><span id="statusText">Ready</span></div>
    </header>

    <main class="home-view">
      <section class="time-area">
        <div id="dateText" class="date-text">---- / -- / --</div>
        <div id="clockText" class="clock-text">--:--:--</div>
      </section>

      <section class="clock-area">
        <div class="leaf leaf-left">❧</div>
        <div class="soft-ring ring-a"></div>
        <div class="soft-ring ring-b"></div>
        <button id="clockBtn" class="clock-btn" type="button" aria-label="開始工作">
          <span class="sun-mark">☼</span>
          <strong id="clockMainText">CLOCK IN</strong>
          <small id="clockSubText">開始工作</small>
          <em id="workTimer">00:00:00</em>
        </button>
      </section>

      <p id="todayState" class="today-state">✦ 今日尚未打卡</p>
    </main>

    <nav class="bottom-nav">
      <button class="active" type="button"><span>◷</span>打卡</button>
      <button id="recordsBtn" type="button"><span>□</span>紀錄</button>
      <button id="resetBtn" type="button"><span>♡</span>重置</button>
    </nav>

    <section id="settlementSheet" class="settlement-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <h2>Daily Settlement</h2>
      <div class="tiny-leaf">⌁ ❧ ⌁</div>

      <div class="work-period card-soft">
        <div class="circle-icon">◷</div>
        <div>
          <span>工作期間</span>
          <strong id="periodText">--:-- – --:--</strong>
        </div>
        <b id="hoursText">0 小時</b>
      </div>

      <div class="formula-card">
        <div><span>時薪</span><b>$ 200</b></div>
        <i>×</i>
        <div><span>工時</span><b id="formulaHours">0 小時</b></div>
        <i>=</i>
        <div><span>基本薪資</span><b id="basePayText">$ 0</b></div>
      </div>

      <div class="adjust-card">
        <h3>薪資調整項目</h3>
        <label>
          <span class="minus">−</span>
          <p>午餐代扣金額</p>
          <input id="lunchInput" type="number" inputmode="numeric" placeholder="$ 0" />
        </label>
        <label>
          <span class="plus">＋</span>
          <p>代墊金額</p>
          <input id="reimburseInput" type="number" inputmode="numeric" placeholder="$ 0" />
        </label>
        <label class="note-row">
          <span>□</span>
          <input id="noteInput" type="text" placeholder="備註（選填）" />
        </label>
      </div>

      <div class="final-card">
        <span>今日實領金額</span>
        <strong id="finalPayText">$ 0</strong>
      </div>

      <button id="saveBtn" class="save-btn" type="button">✓ 完成，儲存紀錄</button>
      <p class="save-hint">打卡紀錄將自動保存於本機</p>
    </section>

    <section id="recordsPanel" class="records-panel" aria-hidden="true">
      <div class="panel-card">
        <button id="closeRecordsBtn" type="button">×</button>
        <h2>近期紀錄</h2>
        <div id="recordList" class="record-list"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
