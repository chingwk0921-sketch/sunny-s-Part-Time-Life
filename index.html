<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny's Studio Clock In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Sunny's Studio</h1>
        <p>用心工作・好好生活</p>
      </div>
      <div class="status-pill"><span></span><b id="statusText">Ready</b></div>
    </header>

    <main class="home-view" id="homeView">
      <section class="time-block">
        <div id="dateText">---- / -- / --　星期-</div>
        <strong id="clockText">--:--:--</strong>
      </section>

      <section class="clock-area">
        <div class="gold-dot dot-1"></div>
        <div class="gold-dot dot-2"></div>
        <div class="gold-dot dot-3"></div>
        <div class="soft-ring"></div>
        <button class="clock-button" id="clockButton" type="button">
          <span class="sun-mark">☼</span>
          <span class="button-en" id="buttonEn">CLOCK IN</span>
          <span class="button-zh" id="buttonZh">開始工作</span>
          <span class="work-timer" id="workTimer">00:00:00</span>
        </button>
      </section>

      <p class="today-note" id="todayNote">✦ 今日尚未打卡</p>
    </main>

    <nav class="bottom-nav">
      <button class="active" type="button"><span>◷</span>打卡</button>
      <button type="button" id="recordsBtn"><span>▱</span>紀錄</button>
      <button type="button" id="settingsBtn"><span>♙</span>設定</button>
    </nav>
  </div>

  <div class="overlay" id="overlay"></div>

  <section class="settlement-sheet" id="settlementSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <h2>Daily Settlement</h2>
      <div class="leaf-divider">— — —</div>

      <div class="period-card">
        <div class="period-icon">◷</div>
        <div>
          <small>工作期間</small>
          <p id="periodText">--:-- – --:--</p>
        </div>
        <strong><span id="hoursText">0.0</span> 小時</strong>
      </div>

      <div class="formula-card">
        <div><small>時薪</small><p>$ 200</p></div>
        <em>×</em>
        <div><small>工時</small><p><span id="formulaHours">0.0</span> 小時</p></div>
        <em>=</em>
        <div><small>基本薪資</small><p id="basePayText">$ 0</p></div>
      </div>

      <div class="adjust-card">
        <h3>薪資調整項目</h3>
        <label class="adjust-row">
          <span class="minus">−</span>
          <b>午餐代扣金額</b>
          <input id="lunchInput" inputmode="numeric" type="number" min="0" placeholder="$ 0" />
        </label>
        <label class="adjust-row">
          <span class="plus">＋</span>
          <b>代墊金額</b>
          <input id="reimburseInput" inputmode="numeric" type="number" min="0" placeholder="$ 0" />
        </label>
        <input class="note-input" id="noteInput" type="text" placeholder="備註（選填）" />
      </div>

      <div class="total-card">
        <span>今日實領金額</span>
        <strong id="finalPayText">$ 0</strong>
      </div>

      <input class="note-input wide" id="dailyNoteInput" type="text" placeholder="備註（選填）" />

      <button class="save-btn" id="saveBtn" type="button">✓　完成，儲存紀錄</button>
      <p class="safe-note">♧ 打卡紀錄將自動保存於本機</p>
    </div>
  </section>

  <section class="simple-panel" id="recordsPanel" aria-hidden="true">
    <button class="panel-close" type="button" data-close-panel>×</button>
    <h2>Records</h2>
    <div id="recordsList" class="records-list"></div>
  </section>

  <section class="simple-panel" id="settingsPanel" aria-hidden="true">
    <button class="panel-close" type="button" data-close-panel>×</button>
    <h2>Settings</h2>
    <p class="setting-text">目前時薪固定為 <b>$200 / 小時</b>。下一版可以再加入雲端同步、老師查看頁、月結統計。</p>
  </section>

  <script src="app.js"></script>
</body>
</html>
